{% extends 'base.html' %}
{% block title %}Register — SkillSwap{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <h2>Join SkillSwap</h2>
      <p>Create your account — it's free forever</p>
    </div>
    <form method="POST" class="auth-form">
      <div class="field-group">
        <label>Full Name</label>
        <input type="text" name="name" placeholder="Your name" required/>
      </div>
      <div class="field-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="you@example.com" required/>
      </div>
      <div class="field-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Min 8 characters" required minlength="8"/>
      </div>
      <button type="submit" class="btn-primary btn-full">Create Account</button>
    </form>
    <p class="auth-switch">Already have an account? <a href="{{ url_for('auth.login') }}">Login</a></p>
  </div>
</div>
{% endblock %}
