{% extends 'base.html' %}
{% block title %}Forgot Password — SkillSwap{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <h2>Forgot Password</h2>
      <p>Enter your email and we'll send a reset code.</p>
    </div>
    <form method="POST" class="auth-form">
      <div class="field-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="you@example.com" required/>
      </div>
      <button type="submit" class="btn-primary btn-full">Send Reset Code</button>
    </form>
    <p class="auth-switch"><a href="{{ url_for('auth.login') }}">← Back to Login</a></p>
  </div>
</div>
{% endblock %}
