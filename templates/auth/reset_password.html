{% extends 'base.html' %}
{% block title %}Reset Password — SkillSwap{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <h2>Reset Password</h2>
      <p>Enter the code from your email and set a new password.</p>
    </div>
    <form method="POST" class="auth-form">
      <div class="field-group">
        <label>OTP Code</label>
        <input type="text" name="otp" placeholder="6-digit code" maxlength="6" required/>
      </div>
      <div class="field-group">
        <label>New Password</label>
        <input type="password" name="password" placeholder="Min 8 characters" minlength="8" required/>
      </div>
      <button type="submit" class="btn-primary btn-full">Reset Password</button>
    </form>
  </div>
</div>
{% endblock %}
